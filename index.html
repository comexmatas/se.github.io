<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Normal Prices Registry</title>
    <style>
        :root {
            --matas-navy: #8ca765;
            --matas-blue: #65a765;
            --matas-light-blue: #90EE90;
            --matas-white: #ffffff;
            --matas-light-gray: #808080;
            --matas-gray: #6c757d;
            --matas-text: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: var(--matas-white);
            min-height: 100vh;
            color: var(--matas-text);
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 30px,
                    rgba(74, 144, 194, 0.08) 30px,
                    rgba(74, 144, 194, 0.08) 60px
                );
            z-index: -1;
            pointer-events: none;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            background: var(--matas-white);
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(0, 41, 69, 0.1);
            border: 1px solid var(--matas-light-blue);
        }
        
        .header h1 {
            margin: 0 0 15px 0;
            color: var(--matas-navy);
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            position: relative;
            z-index: 1;
        }
        
        .header p {
            margin: 0;
            color: var(--matas-gray);
            font-size: 1.1rem;
            position: relative;
            z-index: 1;
        }
        
        .controls {
            background: var(--matas-white);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(0, 41, 69, 0.08);
            margin-bottom: 25px;
            border: 1px solid var(--matas-light-blue);
        }
        
        .controls-row {
            display: grid;
            grid-template-columns: 1fr auto auto auto auto auto;
            gap: 12px;
            align-items: end;
        }

        .search-wrapper {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .search-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--matas-blue);
            letter-spacing: 0.03em;
            text-transform: uppercase;
            padding-left: 2px;
        }
        
        .filter-select {
            padding: 12px 18px;
            border: 2px solid var(--matas-light-blue);
            border-radius: 12px;
            font-size: 15px;
            background: var(--matas-white);
            color: var(--matas-text);
            transition: all 0.3s ease;
            cursor: pointer;
            min-width: 150px;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23007CB2%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 12px top 50%;
            background-size: 12px auto;
            padding-right: 30px;
        }
        
        .filter-select:focus {
            outline: none;
            border-color: var(--matas-blue);
            box-shadow: 0 0 0 3px rgba(74, 144, 194, 0.15);
            transform: translateY(-1px);
        }
        
        .search-input {
            width: 100%;
            padding: 12px 18px;
            border: 2px solid var(--matas-light-blue);
            border-radius: 12px;
            font-size: 15px;
            background: var(--matas-white);
            color: var(--matas-text);
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--matas-blue);
            box-shadow: 0 0 0 3px rgba(74, 144, 194, 0.15);
            transform: translateY(-1px);
        }
        
        .load-button, .sync-button {
            background: var(--matas-navy);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        
        .load-button:hover, .sync-button:hover { 
            background: var(--matas-blue);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 41, 69, 0.3);
        }
        
        .load-button:disabled, .sync-button:disabled {
            background: var(--matas-gray);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .load-button:disabled::before, .sync-button:disabled::before {
            opacity: 0;
        }
        
        .status-bar {
            margin-top: 10px;
            color: #7f8c8d;
            font-size: 13px;
        }
        
        .table-container {
            background: var(--matas-white);
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(0, 41, 69, 0.08);
            overflow: auto;
            border: 1px solid var(--matas-light-blue);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: var(--matas-navy);
            color: white;
            padding: 16px 12px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 2;
            font-size: 13px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        td {
            padding: 14px 12px;
            border-bottom: 1px solid rgba(168, 208, 240, 0.2);
            white-space: nowrap;
            position: relative;
            z-index: 1;
        }
        
        tr:hover {
            background: linear-gradient(90deg, rgba(168, 208, 240, 0.1), rgba(255, 179, 198, 0.1));
        }

        /* Product link styling */
        td a {
            color: var(--matas-blue);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s ease;
            position: relative;
        }

        td a:hover {
            color: var(--matas-navy);
            text-decoration: underline;
            text-decoration-color: var(--matas-coral);
            text-decoration-thickness: 2px;
            text-underline-offset: 3px;
        }

        td a:active {
            color: var(--matas-coral);
        }
        
        .error {
            background-color: #e74c3c;
            color: white;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }
        
        .pagination {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            align-items: center;
            padding: 10px 12px;
        }
        
        .pagination button {
            padding: 6px 10px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            border-radius: 4px;
        }
        
        .pagination button:disabled {
            color: #aaa;
            cursor: not-allowed;
            background: #f6f6f6;
        }
        
        .price-input {
            width: 120px;
            padding: 6px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .row-dirty {
            background-color: #fffbea;
        }
        
        .cell-error {
            outline: 2px solid #e74c3c;
            background: #fdecea;
        }
        
        .thumb {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #eee;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .thumb:hover {
            transform: scale(1.1);
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
        }
        
        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 90%;
            max-height: 90%;
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .modal-image {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 4px;
        }
        
            .modal-close {
                position: absolute;
                top: 10px;
                right: 15px;
                font-size: 28px;
                font-weight: bold;
                color: #aaa;
                cursor: pointer;
                background: none;
                border: none;
                padding: 0;
                width: 44px;
                height: 44px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 50%;
                transition: all 0.2s ease;
            }
        
        .modal-close:hover {
            color: #000;
        }

        /* Authentication styles */
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--matas-white);
            position: relative;
        }

        .auth-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 30px,
                    rgba(74, 144, 194, 0.08) 30px,
                    rgba(74, 144, 194, 0.08) 60px
                );
            z-index: 1;
            pointer-events: none;
        }

        .auth-card {
            background: var(--matas-white);
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 41, 69, 0.15);
            width: 100%;
            max-width: 420px;
            text-align: center;
            position: relative;
            z-index: 2;
            border: 1px solid var(--matas-light-blue);
        }

        .auth-card h1 {
            margin: 0 0 15px 0;
            color: var(--matas-navy);
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -1px;
            position: relative;
            z-index: 1;
        }

        .auth-card p {
            margin: 0 0 35px 0;
            color: var(--matas-gray);
            font-size: 1rem;
            line-height: 1.5;
            position: relative;
            z-index: 1;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 25px;
            position: relative;
            z-index: 1;
        }

        .token-input {
            padding: 16px 20px;
            border: 2px solid var(--matas-light-blue);
            border-radius: 14px;
            font-size: 15px;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            transition: all 0.3s ease;
            background: var(--matas-white);
            color: var(--matas-text);
        }

        .token-input:focus {
            outline: none;
            border-color: var(--matas-blue);
            box-shadow: 0 0 0 4px rgba(74, 144, 194, 0.15);
            transform: translateY(-2px);
        }

        .token-input.error {
            border-color: var(--matas-coral);
            background-color: rgba(255, 107, 138, 0.05);
            box-shadow: 0 0 0 4px rgba(255, 107, 138, 0.15);
        }

        .auth-button {
            background: var(--matas-navy);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .auth-button:hover {
            background: var(--matas-blue);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 41, 69, 0.3);
        }

        .auth-button:disabled {
            background: var(--matas-gray);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .auth-button:disabled::before {
            opacity: 0;
        }

        .auth-error {
            background-color: #e74c3c;
            color: white;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            margin-top: 15px;
        }

        .auth-loading {
            color: #7f8c8d;
            font-size: 14px;
            margin-top: 15px;
        }

        .main-app {
            display: none;
        }

        .main-app.authenticated {
            display: block;
        }

        .logout-button {
            background-color: var(--matas-gray);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
            transition: all 0.2s ease;
        }

        .logout-button:hover {
            background-color: var(--matas-navy);
            transform: translateY(-1px);
        }

        .debug-info {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 10px;
            margin-top: 10px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        /* Mobile and Tablet Responsive Styles */
        @media screen and (max-width: 768px) {
            body {
                padding: 10px;
                margin: 0;
            }

            .header {
                padding: 20px 15px;
                margin-bottom: 20px;
            }

            .header h1 {
                font-size: 2rem;
                margin-bottom: 10px;
            }

            .header p {
                font-size: 1rem;
            }

            .controls {
                padding: 15px;
                margin-bottom: 15px;
            }

            .controls-row {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .filter-select {
                width: 100%;
                padding: 14px 16px;
                font-size: 16px;
                border-radius: 10px;
                min-height: 48px;
            }

            .search-input {
                padding: 14px 16px;
                font-size: 16px; /* Prevents zoom on iOS */
                border-radius: 10px;
            }

            .load-button, .sync-button {
                width: 100%;
                padding: 14px 20px;
                font-size: 16px;
                border-radius: 10px;
            }

            .status-bar {
                font-size: 12px;
                margin-top: 15px;
            }

            #keyboardHints {
                display: none; /* Hide keyboard hints on mobile */
            }

            /* Mobile table styling */
            .table-container {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                border-radius: 8px;
            }

            table {
                min-width: 600px; /* Ensure table doesn't get too compressed */
                font-size: 14px;
            }

            /* Mobile-specific column widths */
            .mobile-device table th:first-child,
            .mobile-device table td:first-child {
                width: 60px; /* Image column */
                min-width: 60px;
            }

            .mobile-device table th:nth-child(2),
            .mobile-device table td:nth-child(2) {
                min-width: 120px; /* Product column */
                max-width: 200px;
                word-wrap: break-word;
                white-space: normal;
                line-height: 1.3;
            }

            .mobile-device table th:nth-child(3),
            .mobile-device table td:nth-child(3) {
                width: 100px; /* Price column */
                min-width: 100px;
            }

            .mobile-device table th:nth-child(4),
            .mobile-device table td:nth-child(4) {
                min-width: 80px; /* Brand column */
                max-width: 120px;
                word-wrap: break-word;
                white-space: normal;
                line-height: 1.3;
            }

            .mobile-device table th:nth-child(5),
            .mobile-device table td:nth-child(5) {
                min-width: 100px; /* Category column */
                max-width: 150px;
                word-wrap: break-word;
                white-space: normal;
                line-height: 1.3;
            }

            th {
                padding: 12px 8px;
                font-size: 12px;
                white-space: nowrap;
            }

            td {
                padding: 12px 8px;
                font-size: 14px;
            }

            .price-input {
                width: 80px;
                padding: 8px 6px;
                font-size: 14px;
                border-radius: 6px;
                border: 2px solid var(--matas-light-blue);
            }

            .price-input:focus {
                border-color: var(--matas-blue);
                box-shadow: 0 0 0 2px rgba(74, 144, 194, 0.15);
            }

            .thumb {
                width: 32px;
                height: 32px;
            }

            .pagination {
                flex-direction: column;
                gap: 10px;
                align-items: stretch;
                padding: 15px;
            }

            .pagination button {
                padding: 12px 16px;
                font-size: 16px;
                border-radius: 8px;
                min-height: 44px; /* Apple touch target size */
            }

            .pagination span {
                text-align: center;
                font-size: 14px;
                margin-bottom: 5px;
            }

            /* Authentication mobile styles */
            .auth-container {
                padding: 20px;
            }

            .auth-card {
                padding: 30px 20px;
                max-width: 100%;
                border-radius: 12px;
            }

            .auth-card h1 {
                font-size: 1.8rem;
            }

            .token-input {
                padding: 16px 18px;
                font-size: 16px; /* Prevents zoom on iOS */
                border-radius: 12px;
            }

            .auth-button {
                padding: 16px 24px;
                font-size: 16px;
                border-radius: 10px;
                min-height: 48px;
            }

            .logout-button {
                padding: 10px 14px;
                font-size: 14px;
                margin-left: 0;
                margin-top: 10px;
                display: block;
                width: auto;
            }

            /* Modal mobile styles */
            .modal-content {
                margin: 10px;
                padding: 15px;
                max-width: calc(100% - 20px);
                max-height: calc(100% - 20px);
                border-radius: 12px;
            }

            .modal-image {
                max-height: 70vh;
            }

            .modal-close {
                top: 5px;
                right: 10px;
                font-size: 24px;
                width: 48px;
                height: 48px;
                background: rgba(0, 0, 0, 0.1);
                border-radius: 50%;
                color: #666;
                min-height: 48px;
                min-width: 48px;
            }

            .modal-close:hover {
                background: rgba(0, 0, 0, 0.2);
                color: #333;
            }
        }

        /* Tablet specific styles */
        @media screen and (min-width: 769px) and (max-width: 1024px) {
            body {
                padding: 15px;
            }

            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 2.2rem;
            }

            .controls {
                padding: 20px;
            }

            .controls-row {
                grid-template-columns: 1fr auto auto auto;
                gap: 15px;
            }

            .search-input {
                font-size: 16px;
            }

            .load-button, .sync-button {
                padding: 14px 24px;
                font-size: 15px;
            }

            table {
                font-size: 15px;
            }

            th {
                padding: 14px 10px;
                font-size: 13px;
            }

            td {
                padding: 13px 10px;
            }

            .price-input {
                width: 100px;
                padding: 8px 10px;
                font-size: 15px;
            }

            .pagination button {
                padding: 10px 16px;
                font-size: 15px;
                min-height: 42px;
            }
        }

        /* Touch-friendly enhancements for all mobile devices */
        @media (hover: none) and (pointer: coarse) {
            /* Increase touch targets */
            button, input, select, textarea, a {
                min-height: 44px;
            }

            .load-button, .sync-button, .auth-button {
                min-height: 48px;
            }

            /* Remove hover effects on touch devices */
            .load-button:hover, .sync-button:hover, .auth-button:hover {
                transform: none;
            }

            /* Better focus states for accessibility */
            .search-input:focus, .token-input:focus, .price-input:focus {
                transform: none;
                border-width: 3px;
            }

            /* Improve table interaction on touch */
            .table-container {
                -webkit-overflow-scrolling: touch;
                scrollbar-width: thin;
            }

            .table-container::-webkit-scrollbar {
                height: 8px;
            }

            .table-container::-webkit-scrollbar-track {
                background: #f1f1f1;
                border-radius: 4px;
            }

            .table-container::-webkit-scrollbar-thumb {
                background: var(--matas-blue);
                border-radius: 4px;
            }

            .table-container::-webkit-scrollbar-thumb:hover {
                background: var(--matas-navy);
            }
        }

        /* Landscape orientation optimizations for mobile */
        @media screen and (max-width: 768px) and (orientation: landscape) {
            .header {
                padding: 15px;
                margin-bottom: 15px;
            }

            .header h1 {
                font-size: 1.8rem;
                margin-bottom: 5px;
            }

            .header p {
                font-size: 0.9rem;
            }

            .controls {
                padding: 12px;
                margin-bottom: 12px;
            }

            .auth-card {
                padding: 20px 15px;
            }

            .auth-card h1 {
                font-size: 1.6rem;
                margin-bottom: 10px;
            }

            .modal-content {
                margin: 5px;
                padding: 10px;
            }

            .modal-image {
                max-height: 80vh;
            }
        }

        /* Extra small screens (smaller phones) */
        @media screen and (max-width: 375px) {
            body {
                padding: 8px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .controls {
                padding: 12px;
            }

            .search-input {
                padding: 12px 14px;
            }

            .load-button, .sync-button {
                padding: 12px 16px;
                font-size: 15px;
            }

            .auth-card {
                padding: 25px 15px;
            }

            .price-input {
                width: 70px;
                padding: 6px 4px;
                font-size: 13px;
            }

            th, td {
                padding: 10px 6px;
                font-size: 13px;
            }

            .pagination {
                padding: 12px;
            }

            .pagination button {
                padding: 10px 12px;
                font-size: 14px;
            }
        }

        /* Mobile-specific CSS classes for JavaScript */

</head>
<body>
    <!-- Authentication Screen -->
    <div id="authContainer" class="auth-container">
        <div class="auth-card">
            <h1>Authentication Required</h1>
            <p>Please enter the access token provided by your contact person.</p>
            
            <form id="authForm" class="auth-form">

                    type="password" 
                    id="tokenInput" 
                    class="token-input" 
                    placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"

                />

            <div id="authError" class="auth-error" style="display: none;"></div>

        </div>
    </div>

    <!-- Main Application (hidden until authenticated) -->
    <div id="mainApp" class="main-app">
        <div class="header">
            <h1>Product Prices in Normal</h1>
            <p>Find and register product prices in Normal.
                <button id="logoutButton" class="logout-button">Logout</button>

        </div>
    
    <div class="controls">
            <div class="controls-row">
                <div class="search-wrapper">
                    <label class="search-label" for="searchInput">Search by Product or Varenummer</label>
                    <input id="searchInput" class="search-input" type="search" placeholder="Product name or ID…" inputmode="search" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
                </div>
                <select id="brandFilter" class="filter-select">
                    <option value="">All Brands</option>
				</select>
				<select id="categoryFilter" class="filter-select">
					<option value="">All Categories</option>
				</select>

					<option value="">All Pricing Roles</option>

    </div>
    
    <div id="errorMessage"></div>

            Click "Load Data" to display the contents.

    <!-- Image Preview Modal -->
    <div id="imageModal" class="modal">
