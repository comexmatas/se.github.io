    </div>

    <script>
        // Configuration
        const DEFAULT_FILE = 'data/products.csv';
        const GITHUB_OWNER = 'comexmatas';
        const GITHUB_REPO = 'comexmatas-se.github.io';
        const SESSION_KEY = 'github_token';
        const DEBUG = false; // Set to true for debugging
        
        // UI elements
        const loadButton = document.getElementById('loadButton');
        const syncButton = document.getElementById('syncButton');
        const searchInput = document.getElementById('searchInput');
        const errorMessage = document.getElementById('errorMessage');
        const dataContainer = document.getElementById('dataContainer');
        const statusText = document.getElementById('statusText');
        const dirtyText = document.getElementById('dirtyText');
        const debugInfo = document.getElementById('debugInfo');

        // App state
        const pageSize = 100;
        let headersRef = [];
        let allRows = [];
        let filteredRows = [];
        let currentPage = 1;
        let dirtyById = new Map();
        let errorById = new Set();
        let localChanges = new Set(); // Track which items have local changes
        let lastCommitSha = null;
        let lastSyncTime = null;

        // Authentication state
        let isAuthenticated = false;
        let authToken = null;

        function debugLog(message, data = null) {
            if (DEBUG) {
                console.log(message, data);
                const debugDiv = document.getElementById('debugInfo');
                debugDiv.style.display = 'block';
                const timestamp = new Date().toLocaleTimeString();
                debugDiv.innerHTML += `<div>${timestamp}: ${message}${data ? ' ' + JSON.stringify(data, null, 2) : ''}</div>`;
                debugDiv.scrollTop = debugDiv.scrollHeight;
            }
        }

        // Initialize authentication on page load
        document.addEventListener('DOMContentLoaded', function() {
            checkExistingSession();
            setupAuthHandlers();
            setupAppHandlers();
            
            // Setup modal close button with mobile optimization
            const modalCloseButton = document.getElementById('modalCloseButton');
            if (modalCloseButton) {
                addMobileButtonHandler(modalCloseButton, closeModal);
            }
            
            // Load last sync time
            const savedSyncTime = localStorage.getItem('lastSyncTime');
            if (savedSyncTime) {
                lastSyncTime = savedSyncTime;
            }
        });

        function checkExistingSession() {
            const savedToken = sessionStorage.getItem(SESSION_KEY);
            if (savedToken) {
                validateToken(savedToken, true, true);
            }
        }

        function handleTokenExpired() {
            isAuthenticated = false;
            authToken = null;
            sessionStorage.removeItem(SESSION_KEY);

            document.getElementById('tokenInput').value = '';
            document.getElementById('tokenInput').classList.remove('error');
            document.getElementById('mainApp').classList.remove('authenticated');
            document.getElementById('authContainer').style.display = 'flex';

            const authError = document.getElementById('authError');
            authError.textContent = 'Your access token has expired. Please contact your administrator to receive a new token.';
            authError.style.display = 'block';

            setTimeout(() => {
                document.getElementById('tokenInput').focus();
            }, 100);
        }

        function setupAuthHandlers() {
            const authForm = document.getElementById('authForm');
            const logoutButton = document.getElementById('logoutButton');
            const authButton = document.getElementById('authButton');

            authForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                const token = document.getElementById('tokenInput').value.trim();
                if (token) {
                    await validateToken(token, false);
                }
            });

            // Use mobile-optimized handler for auth button
            addMobileButtonHandler(authButton, async function(e) {
                e.preventDefault();
                const token = document.getElementById('tokenInput').value.trim();
                if (token) {
                    await validateToken(token, false);
                }
            });

            addMobileButtonHandler(logoutButton, function() {
                logout();
            });
        }

        function setupAppHandlers() {
            // Debounced search
            let searchTimer = null;
            searchInput.addEventListener('input', () => {
                if (!allRows.length) return;
                clearTimeout(searchTimer);
                searchTimer = setTimeout(() => {
                    applySearch(searchInput.value.trim());
                    currentPage = 1;
                    render();
                }, 200);
            });
            
            // Filter handlers
            const brandFilter = document.getElementById('brandFilter');
            const categoryFilter = document.getElementById('categoryFilter');
            
            brandFilter.addEventListener('change', () => {
                if (!allRows.length) return;
                applySearch(searchInput.value.trim());
                currentPage = 1;
                render();
            });
            
            categoryFilter.addEventListener('change', () => {
                if (!allRows.length) return;
                applySearch(searchInput.value.trim());
                currentPage = 1;
                render();
            });
			
			const pricingRoleFilter = document.getElementById('pricingRoleFilter');

			pricingRoleFilter.addEventListener('change', () => {
				if (!allRows.length) return;
				applySearch(searchInput.value.trim());
				currentPage = 1;
				render();
			});

			const priceStatusFilter = document.getElementById('priceStatusFilter');

			priceStatusFilter.addEventListener('change', () => {
				if (!allRows.length) return;
				applySearch(searchInput.value.trim());
				currentPage = 1;
				render();
			});
            
            // Enhanced button event handling for mobile
            addMobileButtonHandler(loadButton, function() {
                loadData(DEFAULT_FILE);
            });

            addMobileButtonHandler(syncButton, async () => {
                if (allRows.length === 0) {
                    alert('No data loaded. Please "Load Data" first before syncing.');
                    return;
                }
                if (errorById.size > 0) {
                    alert('Please fix validation errors before syncing.');
                    return;
                }
                if (localChanges.size === 0) {
                    alert('No changes to sync. Make some price edits first.');
                    return;
                }
                
                // Proceed directly with sync (no confirmation dialog)
                
                try {
                    await attemptSync();
                } catch (e) {
                    console.error('Sync failed:', e);
                    alert(`Sync failed: ${e.message}`);
                }
            });
        }

        // Enhanced button handler that works better on mobile devices
        function addMobileButtonHandler(button, handler) {
            if (!button) return;
            
            // Mark button as having mobile handler
            button.setAttribute('data-mobile-handler', 'true');
            
            let touchStartTime = 0;
            let touchHandled = false;
            let lastExecuteTime = 0;
            
            // Touch events for mobile (faster response)
            button.addEventListener('touchstart', function(e) {
                touchStartTime = Date.now();
                touchHandled = false;
                
                // Prevent default to avoid ghost clicks
                e.preventDefault();
                
                // Add visual feedback
                button.style.transform = 'scale(0.98)';
                button.style.transition = 'transform 0.1s ease';
            });
            
            button.addEventListener('touchend', function(e) {
                const touchDuration = Date.now() - touchStartTime;
                const timeSinceLastExecute = Date.now() - lastExecuteTime;
                
                // Reset visual feedback
                setTimeout(() => {
                    button.style.transform = '';
                    button.style.transition = '';
                }, 100);
                
                // Only trigger if it was a quick tap (not a long press or scroll) and not too soon after last execution
                if (touchDuration < 500 && !touchHandled && !button.disabled && timeSinceLastExecute > 200) {
                    touchHandled = true;
                    lastExecuteTime = Date.now();
                    e.preventDefault();
                    e.stopPropagation();
                    
                    // Small delay to ensure visual feedback is seen
                    setTimeout(() => {
                        handler.call(button, e);
                    }, 50);
                }
            });
            
            button.addEventListener('touchcancel', function() {
                // Reset visual feedback on cancel
                button.style.transform = '';
                button.style.transition = '';
                touchHandled = true;
            });
            
            // Mouse events for desktop (with duplicate prevention)
            button.addEventListener('click', function(e) {
                // Prevent double execution if touch event already handled this
                if (touchHandled) {
                    touchHandled = false;
                    return;
                }
                
                const timeSinceLastExecute = Date.now() - lastExecuteTime;
                
                // Small delay to allow touch events to handle first
                setTimeout(() => {
                    if (!touchHandled && !button.disabled && timeSinceLastExecute > 200) {
                        lastExecuteTime = Date.now();
                        handler.call(button, e);
                    }
                }, 10);
            });
        }

        async function validateToken(token, silent = false, isSessionRestore = false) {
            const authButton = document.getElementById('authButton');
            const authError = document.getElementById('authError');
            const authLoading = document.getElementById('authLoading');
            const tokenInput = document.getElementById('tokenInput');

            if (!silent) {
                authButton.disabled = true;
                authError.style.display = 'none';
                authLoading.style.display = 'block';
                tokenInput.classList.remove('error');
            }

            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}`, {
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (response.ok) {
                    authToken = token;
                    isAuthenticated = true;
                    sessionStorage.setItem(SESSION_KEY, token);
                    showMainApp();
                } else if (response.status === 401) {
                    if (isSessionRestore) {
                        throw new Error('Your access token has expired. Please contact your administrator to receive a new token.');
                    }
                    throw new Error('Invalid or expired token. Please check your token and try again.');
                } else if (response.status === 404) {
                    throw new Error('Access denied. Your token does not have permission to access this repository.');
                } else {
                    throw new Error(`Authentication failed: ${response.status} ${response.statusText}`);
                }
            } catch (error) {
                console.error('Authentication error:', error);
                isAuthenticated = false;
                authToken = null;
                sessionStorage.removeItem(SESSION_KEY);
                if (!silent) {
                    authError.textContent = error.message;
                    authError.style.display = 'block';
                    tokenInput.classList.add('error');
                    tokenInput.focus();
                } else if (isSessionRestore) {
                    // Show the expiry message even though we suppressed the loading UI
                    authError.textContent = error.message;
                    authError.style.display = 'block';
                }
            } finally {
                if (!silent) {
                    authButton.disabled = false;
                    authLoading.style.display = 'none';
                }
            }
        }

        function showMainApp() {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('mainApp').classList.add('authenticated');
        }

        function logout() {
            isAuthenticated = false;
            authToken = null;
            sessionStorage.removeItem(SESSION_KEY);
            
            document.getElementById('tokenInput').value = '';
            document.getElementById('authError').style.display = 'none';
            document.getElementById('tokenInput').classList.remove('error');
            
            document.getElementById('mainApp').classList.remove('authenticated');
            document.getElementById('authContainer').style.display = 'flex';
            
            setTimeout(() => {
                document.getElementById('tokenInput').focus();
            }, 100);
        }

        function loadData(filePath) {
            if (filePath.toLowerCase().endsWith('.csv')) {
                loadCSVFromGitHub(filePath);
            } else {
                errorMessage.innerHTML = `<div class="error">Unsupported file type. Please select a .csv file.</div>`;
            }
        }

        async function loadCSVFromGitHub(filePath) {
            try {
                dataContainer.innerHTML = '<div class="loading">Loading data...</div>';
                errorMessage.innerHTML = '';
                debugLog('Starting to load CSV file from GitHub', filePath);

                if (!authToken) {
                    throw new Error('Authentication required. Please login first.');
                }

                let parsed = null;

                // Load data from API
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${filePath}`,
                    {
                        headers: {
                            'Authorization': `token ${authToken}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    }
                );

                if (response.status === 401) {
                    handleTokenExpired();
                    return;
                }

                if (response.ok) {
                    const data = await response.json();
                    lastCommitSha = data.sha;

                    debugLog('GitHub response data:', {
                        size: data.size,
                        encoding: data.encoding,
                        hasContent: !!data.content,
                        downloadUrl: data.download_url
                    });
                    
                    let content;
                    
                    // Check if file is too large for direct content API (>1MB)
                    if (data.size > 1000000 || !data.content) {
                        debugLog('File too large for content API, using Git Data API');
                        
                        // For large files, we need to use the Git Data API to get the blob
                        // First, get the Git tree to find the file's SHA
                        const treeResponse = await fetch(
                            `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/git/trees/main?recursive=1`,
                            {
                                headers: {
                                    'Authorization': `token ${authToken}`,
                                    'Accept': 'application/vnd.github.v3+json'
                                }
                            }
                        );
                        
                        if (!treeResponse.ok) {
                            throw new Error(`Failed to get repository tree: ${treeResponse.status}`);
                        }
                        
                        const treeData = await treeResponse.json();
                        const fileEntry = treeData.tree.find(entry => entry.path === filePath);
                        
                        if (!fileEntry) {
                            throw new Error(`File ${filePath} not found in repository`);
                        }
                        
                        debugLog('Found file in tree, SHA:', fileEntry.sha);
                        
                        // Now get the blob content
                        const blobResponse = await fetch(
                            `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/git/blobs/${fileEntry.sha}`,
                            {
                                headers: {
                                    'Authorization': `token ${authToken}`,
                                    'Accept': 'application/vnd.github.v3+json'
                                }
                            }
                        );
                        
                        if (!blobResponse.ok) {
                            throw new Error(`Failed to get blob content: ${blobResponse.status}`);
                        }
                        
                        const blobData = await blobResponse.json();
                        debugLog('Got blob data, size:', blobData.size, 'encoding:', blobData.encoding);
                        
                        // Decode the base64 content
                        const cleanContent = blobData.content.replace(/\s/g, '');
                        try {
                            const binaryString = atob(cleanContent);
                            const bytes = new Uint8Array(binaryString.length);
                            for (let i = 0; i < binaryString.length; i++) {
                                bytes[i] = binaryString.charCodeAt(i);
                            }
                            content = new TextDecoder('utf-8').decode(bytes);
                            debugLog('Successfully decoded large file, content length:', content.length);
                        } catch (e) {
                            debugLog('UTF-8 decoding failed for large file, falling back to simple atob:', e);
                            content = atob(cleanContent);
                        }
                    } else {
                        // Small file, use base64 content
                        debugLog('Using base64 content for small file');
                        const cleanContent = data.content.replace(/\s/g, '');
                        
                        try {
                            const binaryString = atob(cleanContent);
                            const bytes = new Uint8Array(binaryString.length);
                            for (let i = 0; i < binaryString.length; i++) {
                                bytes[i] = binaryString.charCodeAt(i);
                            }
                            content = new TextDecoder('utf-8').decode(bytes);
                        } catch (e) {
                            debugLog('UTF-8 decoding failed, falling back to simple atob:', e);
                            content = atob(cleanContent);
                        }
                    }
                    
                    debugLog('Final content sample (first 200 chars):', content.substring(0, 200));
                    debugLog('Final content length:', content.length);
                    
                    // Parse CSV with explicit delimiter
                    parsed = Papa.parse(content, {
                        header: true,
                        delimiter: ';',
                        dynamicTyping: false,
                        skipEmptyLines: true,
                        encoding: 'UTF-8'
                    });
                
                    debugLog('CSV parsed successfully', {
                        rows: parsed.data ? parsed.data.length : 0,
                        errors: parsed.errors ? parsed.errors.length : 0,
                        meta: parsed.meta
                    });
                    
                    if (parsed.errors && parsed.errors.length > 0) {
                        debugLog('CSV parsing errors:', parsed.errors);
                    }
                } else if (response.status === 404) {
                    // File doesn't exist yet
                    hasRemoteData = false;
                    debugLog('File not found, creating empty dataset');
                    parsed = { data: [] };
                } else {
                    throw new Error('Failed to load data');
                }

                if (!parsed || !parsed.data || parsed.data.length === 0) {
                    headersRef = [];
                    allRows = [];
                    filteredRows = [];
                    displayEmpty();
                    return;
                }

                // Get headers from Papa Parse
                const headers = Object.keys(parsed.data[0]);
                debugLog('Headers:', headers);

                // Convert parsed data to our format
                allRows = parsed.data.map((row, idx) => {
                    const obj = {};
                    Object.keys(row).forEach(key => {
                        obj[key] = String(row[key] || '');
                    });
                    obj.__rowIndex = idx;
                    
                    // Use Product ID column for unique identifier
                    const productId = String(obj['Product ID'] || '').trim();
                    
                    obj.__id = productId || `row_${idx}`;
                    return obj;
                }).filter(item => item.__id);

                debugLog('Data rows count:', allRows.length);

                headersRef = headers;
                filteredRows = allRows;
                dirtyById.clear();
                errorById.clear();
                localChanges.clear();
                
                debugLog('After CSV load - before draft restore', {
                    dirtyByIdSize: dirtyById.size,
                    localChangesSize: localChanges.size
                });
                
                currentPage = 1;
                syncButton.disabled = false;
                statusText.textContent = `Loaded ${allRows.length} rows`;
                
                // Populate filters
                populateFilters();
                
                // Try to restore any saved drafts
                loadDraft();
                
                render();
            } catch (error) {
                console.error('Error loading CSV:', error);
                debugLog('Error loading CSV:', error.message);
                errorMessage.innerHTML = `<div class="error">Error loading file: ${error.message}</div>`;
                dataContainer.innerHTML = '<div class="empty-state">Failed to load data.</div>';
            }
        }

        function rowToObject(headers, row, idx) {
            const obj = {};
            headers.forEach((h, i) => { obj[h] = row[i] ?? ''; });
            obj.__rowIndex = idx;
            
            // Use Product ID column for unique identifier
            const productId = String(obj['Product ID'] || '').trim();
            
            obj.__id = productId || `row_${idx}`;
            return obj;
        }

		function populateFilters() {
			if (!allRows.length) return;
			
			const brandFilter = document.getElementById('brandFilter');
			const categoryFilter = document.getElementById('categoryFilter');
			const pricingRoleFilter = document.getElementById('pricingRoleFilter');
			
			// Get unique values
			const brands = new Set(allRows.map(r => r['Brand']).filter(Boolean));
			const categories = new Set(allRows.map(r => r['Category']).filter(Boolean));
			const pricingRoles = new Set(allRows.map(r => r['pricing_role_category']).filter(Boolean));
			
			// Sort values alphabetically
			const sortedBrands = Array.from(brands).sort();
			const sortedCategories = Array.from(categories).sort();
			const sortedPricingRoles = Array.from(pricingRoles).sort();
			
			// Populate brand filter
			brandFilter.innerHTML = '<option value="">All Brands</option>' +
				sortedBrands.map(brand => `<option value="${escapeAttr(brand)}">${escapeHtml(brand)}</option>`).join('');
			
			// Populate category filter
			categoryFilter.innerHTML = '<option value="">All Categories</option>' +
				sortedCategories.map(category => `<option value="${escapeAttr(category)}">${escapeHtml(category)}</option>`).join('');
			
			// Populate pricing role filter
			pricingRoleFilter.innerHTML = '<option value="">All Pricing Roles</option>' +
				sortedPricingRoles.map(role => `<option value="${escapeAttr(role)}">${escapeHtml(role)}</option>`).join('');
		}

		function applySearch(query) {
			const searchQuery = query ? query.toLowerCase() : '';
			const brandFilter = document.getElementById('brandFilter').value;
			const categoryFilter = document.getElementById('categoryFilter').value;
			const pricingRoleFilter = document.getElementById('pricingRoleFilter').value;
			const priceStatusFilter = document.getElementById('priceStatusFilter').value;

			filteredRows = allRows.filter(row => {
				// Apply text search
				const matchesSearch = !searchQuery || ['Product', 'Product ID'].some(
					field => String(row[field] || '').toLowerCase().includes(searchQuery)
				);

				// Apply brand filter
				const matchesBrand = !brandFilter || row['Brand'] === brandFilter;

				// Apply category filter
				const matchesCategory = !categoryFilter || row['Category'] === categoryFilter;

				// Apply pricing role filter
				const matchesPricingRole = !pricingRoleFilter || row['pricing_role_category'] === pricingRoleFilter;

				// Apply price status filter (respect locally edited values)
				let matchesPriceStatus = true;
				if (priceStatusFilter) {
					const effectivePrice = localChanges.has(row.__id)
						? (dirtyById.get(row.__id) || '')
						: (row['Price'] || '');
					const hasPrice = effectivePrice.trim() !== '';
					matchesPriceStatus = priceStatusFilter === 'has_price' ? hasPrice : !hasPrice;
				}

				return matchesSearch && matchesBrand && matchesCategory && matchesPricingRole && matchesPriceStatus;
			});
		}

        function render() {
            if (!filteredRows.length) {
                displayEmpty();
                return;
            }
            const total = filteredRows.length;
            const totalPages = Math.max(1, Math.ceil(total / pageSize));
            if (currentPage > totalPages) currentPage = totalPages;
            const start = (currentPage - 1) * pageSize;
            const pageRows = filteredRows.slice(start, start + pageSize);

            dataContainer.innerHTML = buildTable(headersRef, pageRows) + buildPagination(total, currentPage, totalPages);
            updateDirtyStatus();
        }

        function buildTable(headers, rows) {
            // Use exact CSV column structure - display columns in optimal mobile order
            const displayColumns = ['Image URL', 'Product', 'Price', 'Brand', 'Category'];
            
            // Filter to only show the columns we want (hide Product ID and URL)
            const finalHeaders = displayColumns.filter(col => headers.includes(col));
            
            const thead = `
                <thead>
                    <tr>
                        ${finalHeaders.map(h => `<th>${escapeHtml(h)}</th>`).join('')}
                    </tr>
                </thead>`;
            const tbodyRows = rows.map(r => {
                const rowId = r.__id;
                // Only mark as dirty if it's a user session change
                const isDirty = localChanges.has(rowId);
                // Use user changed value if exists, otherwise use original CSV Price column
                const priceVal = localChanges.has(rowId) ? dirtyById.get(rowId) : (r['Price'] || '');
                const rowClass = isDirty ? ' class="row-dirty"' : '';
                
                const cells = finalHeaders.map(h => {
                    const headerLc = String(h || '').toLowerCase();
                    // Check if this is the Price column (editable)
                    const isPriceColumn = h === 'Price';
                    
                    if (isPriceColumn) {
                        // Render price as editable input
                        const priceInputClass = errorById.has(rowId) ? 'price-input cell-error' : 'price-input';
                        return `<td><input type="text" inputmode="decimal" pattern="[0-9]*" class="${priceInputClass}" data-rowid="${escapeAttr(rowId)}" value="${escapeAttr(priceVal)}" placeholder="0.00" /></td>`;
                    } else {
                        // Render other cells normally
                        return `<td>${renderCell(h, r[h], r)}</td>`;
                    }
                }).join('');
                
                return `<tr${rowClass}>${cells}</tr>`;
            }).join('');
            return `
                <div class="table-container">
                    <table>
                        ${thead}
                        <tbody>
                            ${tbodyRows}
                        </tbody>
                    </table>
                </div>`;
        }

        function renderCell(header, value, rowData = null) {
            const text = String(value ?? '');
            
            // Handle Product column as clickable links using URL column
            if (header === 'Product' && rowData) {
                const productUrl = rowData['URL'];
                
                if (productUrl && isValidUrl(productUrl)) {
                    const safeUrl = escapeAttr(productUrl);
                    const safeText = escapeHtml(text);
                    return `<a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${safeText}</a>`;
                }
            }
            
            // Handle Image URL column
            if (header === 'Image URL' && text && isValidUrl(text)) {
                const safeUrl = escapeAttr(text);
                return `<img src="${safeUrl}" class="thumb" onclick="openModal('${safeUrl}')" onerror="this.style.display='none'; this.onerror=null;" />`;
            }
            
            return escapeHtml(text);
        }

        function isValidUrl(string) {
            try {
                new URL(string);
                return true;
            } catch (_) {
                return false;
            }
        }

        function buildPagination(total, page, totalPages) {
            return `
                <div class="pagination">
                    <span>${total} rows • Page ${page} of ${totalPages}</span>
                    <button ${page <= 1 ? 'disabled' : ''} id="prevPage">Prev</button>
                    <button ${page >= totalPages ? 'disabled' : ''} id="nextPage">Next</button>
                </div>`;
        }

        function updateDirtyStatus() {
            const dirtyCount = dirtyById.size;
            dirtyText.textContent = dirtyCount ? ` • ${dirtyCount} edited` : '';
            
            // Attach event listeners only to new inputs (those without listeners)
            document.querySelectorAll('input.price-input:not([data-listeners-attached])').forEach(input => {
                input.addEventListener('input', onPriceInputChange);
                input.addEventListener('blur', onPriceInputBlur);
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') { e.currentTarget.blur(); }
                });
                input.setAttribute('data-listeners-attached', 'true');
            });
            
            // Attach pagination event listeners only once with mobile optimization
            const prevBtn = document.getElementById('prevPage');
            const nextBtn = document.getElementById('nextPage');
            if (prevBtn && !prevBtn.hasAttribute('data-listener-attached')) {
                addMobileButtonHandler(prevBtn, () => { 
                    currentPage = Math.max(1, currentPage - 1); 
                    render(); 
                });
                prevBtn.setAttribute('data-listener-attached', 'true');
            }
            if (nextBtn && !nextBtn.hasAttribute('data-listener-attached')) {
                addMobileButtonHandler(nextBtn, () => { 
                    currentPage += 1; 
                    render(); 
                });
                nextBtn.setAttribute('data-listener-attached', 'true');
            }
        }

        function onPriceInputChange(e) {
            const input = e.currentTarget;
            const rowId = input.getAttribute('data-rowid');
            let val = input.value.replace(/,/g, '.');
            
            if (!/^\d*(?:\.\d{0,2})?$/.test(val)) {
                errorById.add(rowId);
                input.classList.add('cell-error');
            } else {
                input.classList.remove('cell-error');
                errorById.delete(rowId);
                if (val === '') {
                    dirtyById.delete(rowId);
                    localChanges.delete(rowId);
                } else {
                    dirtyById.set(rowId, val);
                    localChanges.add(rowId); // Track this as a local change
                }
            }
            
            const tr = input.closest('tr');
            if (tr) {
                // Only mark row as dirty if it's a user session change
                if (localChanges.has(rowId)) tr.classList.add('row-dirty'); 
                else tr.classList.remove('row-dirty');
            }
            // Show count of user session edits only
            dirtyText.textContent = localChanges.size ? ` • ${localChanges.size} edited` : '';
            syncButton.disabled = errorById.size > 0 || localChanges.size === 0;
        }

        function onPriceInputBlur(e) {
            const input = e.currentTarget;
            const rowId = input.getAttribute('data-rowid');
            let val = input.value.replace(/,/g, '.');
            if (val && /^\d+(?:\.\d+)?$/.test(val)) {
                const num = Number(val);
                input.value = Number.isFinite(num) ? num.toFixed(2) : val;
                dirtyById.set(rowId, input.value);
            }
        }
        
        async function attemptSync() {
            if (!authToken) {
                throw new Error('Authentication required. Please login again.');
            }

            try {
                statusText.textContent = 'Syncing with GitHub...';
                syncButton.disabled = true;
                syncButton.textContent = 'Syncing...';

                // Step 1: Load data
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${DEFAULT_FILE}`,
                    {
                        headers: {
                            'Authorization': `token ${authToken}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    }
                );

                let remoteDatabase = [];
                let hasRemoteData = false;

                if (response.status === 401) {
                    handleTokenExpired();
                    throw new Error('Your access token has expired. Please log in again with a new token.');
                }

                if (response.ok) {
                    const data = await response.json();
                    lastCommitSha = data.sha;

                    let content;

                    // Check if file is too large for direct content API (>1MB)
                    if (data.size > 1000000 || !data.content) {
                        // For large files, use the Git Data API to get the blob
                        const treeResponse = await fetch(
                            `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/git/trees/main?recursive=1`,
                            {
                                headers: {
                                    'Authorization': `token ${authToken}`,
                                    'Accept': 'application/vnd.github.v3+json'
                                }
                            }
                        );
                        
                        if (!treeResponse.ok) {
                            throw new Error(`Failed to get repository tree: ${treeResponse.status}`);
                        }
                        
                        const treeData = await treeResponse.json();
                        const fileEntry = treeData.tree.find(entry => entry.path === DEFAULT_FILE);
                        
                        if (!fileEntry) {
                            throw new Error(`File ${DEFAULT_FILE} not found in repository`);
                        }
                        
                        // Get the blob content
                        const blobResponse = await fetch(
                            `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/git/blobs/${fileEntry.sha}`,
                            {
                                headers: {
                                    'Authorization': `token ${authToken}`,
                                    'Accept': 'application/vnd.github.v3+json'
                                }
                            }
                        );
                        
                        if (!blobResponse.ok) {
                            throw new Error(`Failed to get blob content: ${blobResponse.status}`);
                        }
                        
                        const blobData = await blobResponse.json();
                        
                        // Decode the base64 content
                        const cleanContent = blobData.content.replace(/\s/g, '');
                        try {
                            const binaryString = atob(cleanContent);
                            const bytes = new Uint8Array(binaryString.length);
                            for (let i = 0; i < binaryString.length; i++) {
                                bytes[i] = binaryString.charCodeAt(i);
                            }
                            content = new TextDecoder('utf-8').decode(bytes);
                        } catch (e) {
                            content = atob(cleanContent);
                        }
                    } else {
                        // Small file, use base64 content
                        const cleanContent = data.content.replace(/\s/g, '');
                        try {
                            const binaryString = atob(cleanContent);
                            const bytes = new Uint8Array(binaryString.length);
                            for (let i = 0; i < binaryString.length; i++) {
                                bytes[i] = binaryString.charCodeAt(i);
                            }
                            content = new TextDecoder('utf-8').decode(bytes);
                        } catch (e) {
                            debugLog('UTF-8 decoding failed, falling back to simple atob:', e);
                            content = atob(cleanContent);
                        }
                    }
                    
                    // Parse CSV with explicit delimiter
                    const parsed = Papa.parse(content, {
                        header: true,
                        delimiter: ';',
                        dynamicTyping: false,
                        skipEmptyLines: true,
                        encoding: 'UTF-8'
                    });
                    
                    remoteDatabase = parsed.data.map((row, idx) => {
                        const obj = {};
                        Object.keys(row).forEach(key => {
                            obj[key] = String(row[key] || '');
                        });
                        obj.__rowIndex = idx;
                        
                        // Use Product ID column for unique identifier
                        const productId = String(obj['Product ID'] || '').trim();
                        
                        obj.__id = productId || `row_${idx}`;
                        return obj;
                    }).filter(item => item.__id);
                    
                    hasRemoteData = true;
                } else if (response.status === 404) {
                    // File doesn't exist yet
                    hasRemoteData = false;
                } else {
                    throw new Error('Failed to load data');
                }

                // Step 2: Merge databases
                const mergedDatabase = mergeDatabase(allRows, remoteDatabase);
                
                // Step 3: Check for overwrites and warn
                const overwrites = detectOverwrites(allRows, remoteDatabase);
                
                if (overwrites.length > 0 && localChanges.size > 0) {
                    const message = `This sync will overwrite ${overwrites.length} remote record(s) with your local changes:\n\n` +
                                  overwrites.slice(0, 5).map(id => `• ${id}`).join('\n') +
                                  (overwrites.length > 5 ? `\n... and ${overwrites.length - 5} more` : '') +
                                  '\n\nContinue?';
                    
                    if (!confirm(message)) {
                        statusText.textContent = 'Sync cancelled';
                        return;
                    }
                }

                // Step 4: Update local database
                allRows = mergedDatabase;
                filteredRows = allRows;
                
                // Step 5: Push to GitHub
                await pushToGitHub();
                
                // Step 6: Clear local changes tracking
                const changeCount = localChanges.size;
                localChanges.clear();
                dirtyById.clear();
                localStorage.removeItem('priceDraft');
                
                // Step 7: Update UI
                currentPage = 1;
                render();
                
                const newRecords = mergedDatabase.length - (hasRemoteData ? remoteDatabase.length : 0);
                statusText.textContent = `✅ Sync complete! ${allRows.length} total records${newRecords > 0 ? ` (+${newRecords} new)` : ''}`;
                
            } catch (error) {
                console.error('Sync error:', error);
                statusText.textContent = `❌ Sync failed: ${error.message}`;
                throw error;
            } finally {
                syncButton.disabled = false;
                syncButton.textContent = 'Sync';
            }
        }

        function mergeDatabase(local, remote) {
            const merged = new Map();
            const syncTimestamp = new Date().toISOString();
            
            // First, add all remote records
            remote.forEach(item => {
                merged.set(item.__id, {...item});
            });
            
            // Then, overwrite with local records (local wins)
            local.forEach(item => {
                if (localChanges.has(item.__id)) {
                    // This is a local change, update sync timestamp
                    const updatedItem = {...item};
                    
                    // Apply local price changes
                    if (dirtyById.has(item.__id)) {
                        // Update the Price field to match CSV structure
                        updatedItem.Price = dirtyById.get(item.__id);
                    }
                    
                    updatedItem.lastSyncedAt = syncTimestamp;
                    merged.set(item.__id, updatedItem);
                } else {
                    // Keep existing remote item (no local changes)
                    // Don't overwrite remote
                }
            });
            
            return Array.from(merged.values());
        }

        function detectOverwrites(local, remote) {
            const overwrites = [];
            
            local.forEach(localItem => {
                if (localChanges.has(localItem.__id)) {
                    const remoteItem = remote.find(r => r.__id === localItem.__id);
                    if (remoteItem) {
                        // Check if remote has been modified since our last sync
                        if (remoteItem.lastSyncedAt && lastSyncTime) {
                            const remoteSync = new Date(remoteItem.lastSyncedAt);
                            const ourLastSync = new Date(lastSyncTime);
                            if (remoteSync > ourLastSync) {
                                overwrites.push(localItem.__id);
                            }
                        }
                    }
                }
            });
            
            return overwrites;
        }
        

        async function pushToGitHub() {
            // Add sync timestamp to all records
            const syncTimestamp = new Date().toISOString();
            
            // Convert database to CSV with semicolon delimiter
            const csv = Papa.unparse(allRows, {
                delimiter: ';'
            });
            const content = btoa(unescape(encodeURIComponent(csv))); // Better encoding for special characters
            
            const message = `Sync at ${new Date().toLocaleString()}`;
            
            const body = {
                message: message,
                content: content,
                branch: 'main'
            };
            
            if (lastCommitSha) {
                body.sha = lastCommitSha;
            }
            
            const response = await fetch(
                `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${DEFAULT_FILE}`,
                {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${authToken}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                }
            );

            if (response.ok) {
                const data = await response.json();
                lastCommitSha = data.content.sha;
                lastSyncTime = syncTimestamp;
                localStorage.setItem('lastSyncTime', lastSyncTime);
            } else if (response.status === 401) {
                handleTokenExpired();
                throw new Error('Your access token has expired. Please log in again with a new token.');
            } else {
                const error = await response.json();
                throw new Error(error.message || 'Failed to push to GitHub');
            }
        }

        function displayEmpty() {
            dataContainer.innerHTML = '<div class="empty-state">No data to display.</div>';
            statusText.textContent = 'No data loaded.';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeAttr(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function openModal(imageUrl) {
            const modal = document.getElementById('imageModal');
            const modalImage = document.getElementById('modalImage');
            modalImage.src = imageUrl;
            modal.style.display = 'block';
        }

        function closeModal() {
            const modal = document.getElementById('imageModal');
            modal.style.display = 'none';
        }

        // Close modal when clicking outside or pressing Escape
        window.addEventListener('click', function(event) {
            const modal = document.getElementById('imageModal');
            if (event.target === modal) {
                closeModal();
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', function(event) {
            // Escape key closes modal
            if (event.key === 'Escape') {
                closeModal();
            }
            
            // Ctrl+S or Cmd+S triggers sync (prevent default save behavior)
            if ((event.ctrlKey || event.metaKey) && event.key === 's') {
                event.preventDefault();
                if (isAuthenticated && syncButton && !syncButton.disabled) {
                    syncButton.click();
                }
            }
            
            // Ctrl+L or Cmd+L focuses search
            if ((event.ctrlKey || event.metaKey) && event.key === 'l') {
                event.preventDefault();
                if (searchInput) {
                    searchInput.focus();
                    searchInput.select();
                }
            }
            
            // Ctrl+D or Cmd+D clears draft data (debug function)
            if ((event.ctrlKey || event.metaKey) && event.key === 'd') {
                event.preventDefault();
                clearProblemDraftData();
            }
        });

        // Mobile-specific enhancements
        function initMobileEnhancements() {
            // Detect mobile devices
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            
            if (isMobile || isTouch) {
                // Add mobile class to body for CSS targeting
                document.body.classList.add('mobile-device');
                
                // Optimize table scrolling on mobile
                const tableContainer = document.querySelector('.table-container');
                if (tableContainer) {
                    // Add momentum scrolling
                    tableContainer.style.webkitOverflowScrolling = 'touch';
                    
                    // Add scroll indicators
                    let scrollTimeout;
                    tableContainer.addEventListener('scroll', function() {
                        tableContainer.classList.add('scrolling');
                        clearTimeout(scrollTimeout);
                        scrollTimeout = setTimeout(() => {
                            tableContainer.classList.remove('scrolling');
                        }, 150);
                    });
                }
                
                // Prevent double-tap zoom on buttons (but allow our custom handlers to work)
                document.addEventListener('touchend', function(event) {
                    if ((event.target.tagName === 'BUTTON' || event.target.type === 'button') && 
                        !event.target.hasAttribute('data-mobile-handler')) {
                        event.preventDefault();
                    }
                });
                
                // Handle virtual keyboard on mobile
                let initialViewportHeight = window.innerHeight;
                window.addEventListener('resize', function() {
                    const currentHeight = window.innerHeight;
                    const heightDifference = initialViewportHeight - currentHeight;
                    
                    // If height decreased significantly, virtual keyboard is likely open
                    if (heightDifference > 150) {
                        document.body.classList.add('virtual-keyboard-open');
                        
                        // Adjust modal positioning if open
                        const modal = document.getElementById('imageModal');
                        if (modal && modal.style.display === 'block') {
                            const modalContent = modal.querySelector('.modal-content');
                            modalContent.style.top = '20px';
                            modalContent.style.transform = 'translateX(-50%)';
                        }
                    } else {
                        document.body.classList.remove('virtual-keyboard-open');
                        
                        // Reset modal positioning
                        const modal = document.getElementById('imageModal');
                        if (modal) {
                            const modalContent = modal.querySelector('.modal-content');
                            modalContent.style.top = '50%';
                            modalContent.style.transform = 'translate(-50%, -50%)';
                        }
                    }
                });
                
                // Auto-hide address bar on mobile Safari
                if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
                    setTimeout(function() {
                        window.scrollTo(0, 1);
                    }, 100);
                }
            }
            
            // Enhanced touch handling for price inputs
            document.addEventListener('touchstart', function(event) {
                if (event.target.classList.contains('price-input')) {
                    // Add visual feedback for touch
                    event.target.style.transform = 'scale(1.02)';
                    event.target.style.transition = 'transform 0.1s ease';
                    
                    setTimeout(() => {
                        event.target.style.transform = '';
                        event.target.style.transition = '';
                    }, 100);
                }
            });
            
            // Improved modal touch handling
            const modal = document.getElementById('imageModal');
            if (modal) {
                let startY;
                let currentY;
                let isDragging = false;
                
                modal.addEventListener('touchstart', function(e) {
                    startY = e.touches[0].clientY;
                    isDragging = true;
                });
                
                modal.addEventListener('touchmove', function(e) {
                    if (!isDragging) return;
                    
                    currentY = e.touches[0].clientY;
                    const deltaY = currentY - startY;
                    
                    // Close modal if swiped down significantly
                    if (deltaY > 100) {
                        closeModal();
                        isDragging = false;
                    }
                });
                
                modal.addEventListener('touchend', function() {
                    isDragging = false;
                });
            }
        }
        
        // Initialize mobile enhancements when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            initMobileEnhancements();
        });

        // Debug function to clear potentially problematic draft data
        function clearProblemDraftData() {
            localStorage.removeItem('priceDraft');
            dirtyById.clear();
            localChanges.clear();
            console.log('Cleared draft data and local changes');
            render();
            alert('Draft data cleared. Try refreshing the page.');
        }

        // Auto-save drafts to localStorage
        function saveDraft() {
            // Only save changes that are actual user session modifications
            if (localChanges.size > 0) {
                const userChanges = {};
                for (const key of localChanges) {
                    if (dirtyById.has(key)) {
                        userChanges[key] = dirtyById.get(key);
                    }
                }
                
                if (Object.keys(userChanges).length > 0) {
                    const draftData = {
                        changes: userChanges,
                        timestamp: new Date().toISOString()
                    };
                    localStorage.setItem('priceDraft', JSON.stringify(draftData));
                } else {
                    localStorage.removeItem('priceDraft');
                }
            } else {
                localStorage.removeItem('priceDraft');
            }
        }

        function loadDraft() {
            const savedDraft = localStorage.getItem('priceDraft');
            if (savedDraft) {
                try {
                    const draftData = JSON.parse(savedDraft);
                    const draftAge = Date.now() - new Date(draftData.timestamp).getTime();
                    
                    // Only restore draft if it's less than 24 hours old
                    if (draftAge < 24 * 60 * 60 * 1000) {
                        // Only restore draft changes that are actual user modifications
                        // (not existing prices from CSV)
                        Object.entries(draftData.changes).forEach(([key, value]) => {
                            // Check if this is actually different from the original CSV value
                            const originalRow = allRows.find(row => row.__id === key);
                            const originalPrice = originalRow ? (originalRow['Price'] || '') : '';
                            
                            // Only restore if the draft value is different from original CSV
                            if (value !== originalPrice) {
                                dirtyById.set(key, value);
                                localChanges.add(key);
                                debugLog('Restored draft change', { key, originalPrice, draftValue: value });
                            }
                        });
                        
                        if (localChanges.size > 0) {
                            statusText.textContent += ` • Draft restored: ${localChanges.size} unsaved changes`;
                            render();
                        }
                    } else {
                        localStorage.removeItem('priceDraft');
                    }
                } catch (e) {
                    console.warn('Failed to load draft:', e);
                    localStorage.removeItem('priceDraft');
                }
            }
        }

        // Save draft whenever changes are made - integrate into onPriceInputChange
        const originalOnPriceInputChange = onPriceInputChange;
        onPriceInputChange = function(e) {
            originalOnPriceInputChange.call(this, e);
            saveDraft();
        };
    </script>
